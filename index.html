<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ProControl México | Dossier Corporativo</title>

  <!-- ── SEO & Open Graph (WhatsApp, LinkedIn, correo) ── -->
  <meta name="description"
        content="Más de 30 años de liderazgo nacional en Ingeniería en Sanidad y Manejo Integrado de Plagas" />

  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="ProControl | Manejo Integrado de Plagas" />
  <meta property="og:description" content="ProControl: 30 años de operación nacional en Manejo Integrado de Plagas y saneamiento para los sectores industrial, comercial y salud." />
  <meta property="og:image"       content="https://gavainc.github.io/Dossier-ProControl/imagenes/miniatura.png" />

  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="ProControl | Manejo Integrado de Plagas" />
  <meta name="twitter:description" content="ProControl: 30 años de operación nacional en Manejo Integrado de Plagas y saneamiento para los sectores industrial, comercial y salud." />
  <meta name="twitter:image"       content="https://gavainc.github.io/Dossier-ProControl/imagenes/miniatura.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    /* ── Stage ────────────────────────────────────────── */
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      perspective: 2800px;
      perspective-origin: 50% 50%;
    }

    /* ── Slides ───────────────────────────────────────── */
    .slide {
      position: absolute;
      inset: 0;
      background-color: #000;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      display: none;
    }
    .slide.active { display: block; z-index: 1; }

    /* ── Page flipper ─────────────────────────────────── */
    .flipper {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform-origin: 0% 50%;
      will-change: transform;
      pointer-events: none;
      z-index: 20;
    }
    .flipper-face {
      position: absolute;
      inset: 0;
      background-color: #000;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .flipper-face::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
        rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.08) 12%, transparent 35%
      );
      pointer-events: none;
    }
    .reveal-shadow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.1s;
      background: linear-gradient(to right,
        rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.15) 25%, transparent 60%
      );
    }
    .reveal-shadow.visible { opacity: 1; }

    /* ── Navigation arrows ────────────────────────────── */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(10,10,10,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      user-select: none;
      transition: background 0.22s, border-color 0.22s, transform 0.18s, opacity 0.3s;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-50%) scale(1.1);
    }
    .nav-btn:active { transform: translateY(-50%) scale(0.92); }
    .nav-btn.off    { opacity: 0; pointer-events: none; }
    #btnPrev { left: 22px; }
    #btnNext { right: 22px; }

    /* ── Counter ──────────────────────────────────────── */
    .counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      letter-spacing: 3px;
      font-family: system-ui, -apple-system, sans-serif;
      pointer-events: none;
      user-select: none;
    }

    /* ════════════════════════════════════════════════════
       HAMBURGER MENU
    ════════════════════════════════════════════════════ */

    /* ── Toggle button ────────────────────────────────── */
    .menu-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 400;
      width: 46px;
      height: 46px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.18);
      background: rgba(10,10,10,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      outline: none;
      transition: background 0.22s, border-color 0.22s;
    }
    .menu-toggle:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.38);
    }
    .bar {
      display: block;
      width: 20px;
      height: 1.5px;
      background: #fff;
      border-radius: 2px;
      transform-origin: center;
      transition: transform 0.32s ease, opacity 0.22s ease;
    }
    .menu-toggle.open .bar:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .menu-toggle.open .bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .menu-toggle.open .bar:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── Backdrop ─────────────────────────────────────── */
    .menu-backdrop {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.48);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.38s ease;
    }
    .menu-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Drawer ───────────────────────────────────────── */
    .menu-drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 350;
      width: 310px;
      max-width: 92vw;
      background: rgba(11,11,14,0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid rgba(255,255,255,0.07);
      transform: translateX(100%);
      transition: transform 0.42s cubic-bezier(0.77, 0, 0.175, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .menu-drawer.open { transform: translateX(0); }

    /* Gold accent line at top */
    .menu-drawer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%, rgba(190,162,100,0.65) 40%,
        rgba(210,180,120,0.8) 60%, transparent 100%
      );
    }

    /* ── Drawer header ────────────────────────────────── */
    .menu-header {
      padding: 26px 24px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .menu-brand {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(190,162,100,0.75);
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 500;
    }
    .menu-brand span {
      display: block;
      margin-top: 3px;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.25);
      font-weight: 400;
    }

    /* ── Scrollable nav body ──────────────────────────── */
    .menu-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 28px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .menu-nav::-webkit-scrollbar { width: 3px; }
    .menu-nav::-webkit-scrollbar-track { background: transparent; }
    .menu-nav::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }

    /* ── Top-level item wrapper ───────────────────────── */
    .menu-item { display: block; }

    /* Row (label + chevron) */
    .menu-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 11px 20px 11px 24px;
      border: none;
      background: none;
      cursor: pointer;
      outline: none;
      text-align: left;
      border-left: 2px solid transparent;
      transition: background 0.16s, border-color 0.16s;
      gap: 8px;
    }
    .menu-row:hover,
    .menu-item.expanded > .menu-row {
      background: rgba(255,255,255,0.04);
      border-left-color: rgba(190,162,100,0.6);
    }
    .menu-row-text {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 500;
      transition: color 0.16s;
      line-height: 1.5;
    }
    .menu-row:hover .menu-row-text,
    .menu-item.expanded > .menu-row .menu-row-text {
      color: #fff;
    }

    /* Chevron SVG */
    .chevron {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      color: rgba(255,255,255,0.35);
      transition: transform 0.3s ease, color 0.2s;
    }
    .menu-item.expanded > .menu-row .chevron {
      transform: rotate(180deg);
      color: rgba(190,162,100,0.8);
    }

    /* ── Submenu container ────────────────────────────── */
    .submenu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .menu-item.expanded > .submenu { max-height: 900px; }

    .submenu-inner {
      padding: 4px 0 8px 24px;
      border-left: 1px solid rgba(255,255,255,0.07);
      margin: 0 16px 0 24px;
    }

    /* Sub-item button */
    .sub-btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border: none;
      background: none;
      cursor: pointer;
      outline: none;
      text-align: left;
      border-radius: 5px;
      transition: background 0.15s, padding-left 0.15s;
    }
    .sub-btn:hover {
      background: rgba(255,255,255,0.06);
      padding-left: 16px;
    }
    .sub-btn-text {
      font-size: 11.5px;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.48);
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 400;
      line-height: 1.5;
      transition: color 0.15s;
    }
    .sub-btn:hover .sub-btn-text { color: rgba(255,255,255,0.88); }

    /* Section divider */
    .menu-divider {
      height: 1px;
      background: rgba(255,255,255,0.05);
      margin: 6px 24px;
    }

    /* ── Drawer footer ────────────────────────────────── */
    .menu-footer {
      padding: 14px 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .menu-page-info {
      font-size: 10px;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.2);
      font-family: system-ui, -apple-system, sans-serif;
      text-transform: uppercase;
    }

    /* ── Action buttons (Print & Share) ───────────────── */
    .action-btn {
      position: fixed;
      right: 18px;
      z-index: 400;
      width: 46px;
      height: 46px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.18);
      background: rgba(10,10,10,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      transition: background 0.22s, border-color 0.22s, color 0.22s, transform 0.15s;
    }
    .action-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.38);
      color: #fff;
    }
    .action-btn:active { transform: scale(0.91); }
    #btnPrint { top: 72px; }
    #btnShare { top: 126px; }

    /* ── Zoom buttons ─────────────────────────────────── */
    .zoom-btn {
      position: fixed;
      right: 20px;
      z-index: 100;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.13);
      background: rgba(10,10,10,0.42);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.52);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      touch-action: manipulation;
      user-select: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
    }
    .zoom-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.9);
    }
    .zoom-btn:active { transform: scale(0.88); }
    .zoom-btn.maxed  { opacity: 0.22; pointer-events: none; }
    #btnZoomIn  { bottom: 100px; }
    #btnZoomOut { bottom: 58px; }

    /* En dispositivos táctiles puros el pellizco ya hace zoom — ocúltalos */
    @media (hover: none) and (pointer: coarse) {
      .zoom-btn { display: none; }
    }

    /* ── Toast ────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(14px);
      z-index: 1000;
      background: rgba(12,12,16,0.95);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 30px;
      font-family: system-ui, -apple-system, sans-serif;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Print image element ──────────────────────────── */
    #print-img { display: none; }

    /* ── QR interactive zones ────────────────────────── */
    .qr-zone {
      position: absolute;
      display: block;
      z-index: 2;
      cursor: pointer;
      background: transparent;
      text-decoration: none;
      border-radius: 5px;
      outline: none;
      border: none;
      transition: box-shadow 0.2s;
    }
    .qr-zone:hover {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.22),
                  0 0 16px rgba(255,255,255,0.08);
    }

    /* ══════════════════════════════════════════════════
       RESPONSIVE — MOBILE & TABLET
    ══════════════════════════════════════════════════ */

    /* Elimina el retraso de 300 ms en taps (todos los navegadores móviles) */
    button { touch-action: manipulation; }

    /* ── Teléfonos (≤ 480 px) ──────────────────────── */
    @media (max-width: 480px) {

      /* El drawer ocupa todo el ancho */
      .menu-drawer {
        width: 100%;
        max-width: 100vw;
        border-left: none;
      }
      .menu-header { padding: 22px 20px 16px; }

      /* Área de toque generosa en ítems del menú */
      .menu-row {
        min-height: 52px;
        padding: 13px 18px 13px 20px;
      }
      .menu-row-text {
        font-size: 12px;
        letter-spacing: 1.5px;
      }

      /* Sub-ítems cómodos para el pulgar */
      .sub-btn {
        min-height: 46px;
        display: flex;
        align-items: center;
      }
      .sub-btn-text { font-size: 13px; }

      /* Hamburguesa y botones de acción más grandes en móvil */
      .menu-toggle  { width: 50px; height: 50px; top: 16px; right: 14px; }
      .action-btn   { width: 50px; height: 50px; right: 14px; }
      #btnPrint     { top: 74px;  }
      #btnShare     { top: 132px; }

      /* Flechas de nav: sutiles en móvil, el swipe es el gesto principal */
      .nav-btn {
        width: 42px;
        height: 42px;
        opacity: 0.5;
        background: rgba(0,0,0,0.25);
      }
      .nav-btn:hover { opacity: 0.85; }
      #btnPrev { left: 6px;  }
      #btnNext { right: 6px; }

      .counter {
        bottom: 14px;
        font-size: 11px;
        letter-spacing: 2px;
      }
      .toast {
        bottom: 52px;
        font-size: 10.5px;
        padding: 9px 18px;
        letter-spacing: 1.5px;
      }
    }

    /* ── Tablets (481 px – 768 px) ─────────────────── */
    @media (min-width: 481px) and (max-width: 768px) {
      .menu-drawer { width: 340px; }
      .menu-row    { min-height: 48px; padding: 12px 18px 12px 22px; }
      .sub-btn     { min-height: 44px; display: flex; align-items: center; }
      .menu-toggle { width: 48px; height: 48px; }
      .action-btn  { width: 48px; height: 48px; }
      #btnPrint    { top: 74px;  }
      #btnShare    { top: 130px; }
    }

    /* ── Safe-area (iPhone X+, Android con notch) ───── */
    @supports (padding: env(safe-area-inset-right)) {
      .menu-toggle,
      .action-btn  { right: calc(18px + env(safe-area-inset-right)); }
      #btnPrev     { left:  calc(22px + env(safe-area-inset-left));  }
      #btnNext     { right: calc(22px + env(safe-area-inset-right)); }
      .menu-drawer { padding-bottom: env(safe-area-inset-bottom);    }
      .counter     { bottom: calc(20px + env(safe-area-inset-bottom)); }
    }

    /* ══════════════════════════════════════════════════
       PRELOADER
    ══════════════════════════════════════════════════ */
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #09090e;
      transition: opacity 0.9s ease;
    }
    #preloader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .pl-brand {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 600;
      letter-spacing: 10px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      margin-bottom: 6px;
    }
    .pl-country {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(11px, 1.4vw, 14px);
      font-weight: 300;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: rgba(190,162,100,0.8);
      margin-bottom: 56px;
    }
    .pl-status {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      animation: plPulse 2.2s ease-in-out infinite;
    }
    @keyframes plPulse {
      0%, 100% { opacity: 0.28; }
      50%       { opacity: 0.68; }
    }

    /* ══════════════════════════════════════════════════
       PRINT RULES
    ══════════════════════════════════════════════════ */
    @media print {
      @page { margin: 0; size: auto; }

      /* Hide the entire page */
      body > * { display: none !important; }

      /* Show only the injected image */
      #print-img {
        display: block !important;
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        object-fit: contain !important;
        background: #000 !important;
      }
    }
  </style>
</head>
<body>

  <!-- ── Preloader ──────────────────────────────────── -->
  <div id="preloader" role="status" aria-label="Cargando presentación">
    <p class="pl-brand">ProControl</p>
    <p class="pl-country">México</p>
    <p class="pl-status">Cargando Dossier&hellip;</p>
  </div>

  <!-- ── Stage ──────────────────────────────────────── -->
  <div class="stage" id="stage">
    <div class="reveal-shadow" id="shadow"></div>
  </div>

  <!-- ── Navigation arrows ──────────────────────────── -->
  <button class="nav-btn off" id="btnPrev" aria-label="Anterior">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <button class="nav-btn" id="btnNext" aria-label="Siguiente">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>

  <div class="counter" id="counter">1 / 29</div>

  <!-- ── Hamburger button ───────────────────────────── -->
  <button class="menu-toggle" id="menuToggle" aria-label="Menú">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>

  <!-- ── Print button ──────────────────────────────── -->
  <button class="action-btn" id="btnPrint" aria-label="Imprimir PDF">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16
               a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
  </button>

  <!-- ── Share button ───────────────────────────────── -->
  <button class="action-btn" id="btnShare" aria-label="Compartir">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"/>
      <circle cx="6"  cy="12" r="3"/>

      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>

  <nav class="menu-drawer" id="menuDrawer" aria-label="Navegación">

    <div class="menu-header">

      <div class="menu-page-info" id="menuPageInfo">Página 1 de 29</div>
    </div>

  </nav>

  <script>
    /* ═══════════════════════════════════════════════════
       SLIDES & FLIP ENGINE
    ═══════════════════════════════════════════════════ */
    const TOTAL   = 29;
    const FLIP_MS = 780;
    const EASE    = 'cubic-bezier(0.77, 0, 0.175, 1)';
    const FADE_MS = 420;

    let current   = 0;
    let animating = false;

    const stage       = document.getElementById('stage');
    const shadow      = document.getElementById('shadow');
    const btnPrev     = document.getElementById('btnPrev');
    const btnNext     = document.getElementById('btnNext');
    const counter     = document.getElementById('counter');
    const menuPageInfo= document.getElementById('menuPageInfo');

    /* Build slides */
    const slides = Array.from({ length: TOTAL }, (_, i) => {
      const el = document.createElement('div');
      el.className = 'slide';
      el.style.backgroundImage = `url('imagenes/${i + 1}.png')`;
      stage.appendChild(el);
      return el;
    });
    slides[0].classList.add('active');
    updateUI();

    /* ── Preloader ──────────────────────────────────── */
    (function () {
      const preloader = document.getElementById('preloader');
      let loaded = 0;
      let dismissed = false;

      function dismiss() {
        if (dismissed) return;
        dismissed = true;
        preloader.classList.add('hidden');
        preloader.addEventListener('transitionend', () => {
          preloader.style.display = 'none';
        }, { once: true });
      }

      /* Precarga real en background — rellena la caché del navegador */
      Array.from({ length: TOTAL }, (_, i) => {
        const img = new Image();
        img.onload = img.onerror = () => { if (++loaded >= TOTAL) dismiss(); };
        img.src = `imagenes/${i + 1}.png`;
      });

      /* Cierre de seguridad: máximo 12 s de espera */
      setTimeout(dismiss, 12000);
    }());

    function updateUI() {
      counter.textContent  = `${current + 1}  /  ${TOTAL}`;
      menuPageInfo.textContent = `Página ${current + 1} de ${TOTAL}`;
      btnPrev.classList.toggle('off', current === 0);
      btnNext.classList.toggle('off', current === TOTAL - 1);
    }

    /* Page-flip animation (adjacent pages) */
    function flipTo(target) {
      if (animating || target === current || target < 0 || target >= TOTAL) return;
      pzReset(slides[current]);
      animating = true;
      const from    = current;
      const forward = target > from;
      const fromSlide = slides[from];
      const toSlide   = slides[target];

      toSlide.classList.add('active');
      toSlide.style.zIndex  = 1;
      fromSlide.style.zIndex = 2;

      const flipper = document.createElement('div');
      flipper.className = 'flipper';
      const face = document.createElement('div');
      face.className = 'flipper-face';

      if (forward) {
        face.style.backgroundImage = `url('imagenes/${from + 1}.png')`;
        flipper.style.transform    = 'rotateY(0deg)';
        fromSlide.style.visibility = 'hidden';
      } else {
        face.style.backgroundImage = `url('imagenes/${target + 1}.png')`;
        flipper.style.transform    = 'rotateY(-180deg)';
        toSlide.style.visibility   = 'hidden';
      }

      flipper.appendChild(face);
      stage.appendChild(flipper);
      shadow.classList.add('visible');

      requestAnimationFrame(() => requestAnimationFrame(() => {
        flipper.style.transition = `transform ${FLIP_MS}ms ${EASE}`;
        flipper.style.transform  = forward ? 'rotateY(-180deg)' : 'rotateY(0deg)';
        setTimeout(() => shadow.classList.remove('visible'), FLIP_MS * 0.55);
      }));

      setTimeout(() => {
        stage.removeChild(flipper);
        fromSlide.classList.remove('active');
        fromSlide.style.zIndex      = '';
        fromSlide.style.visibility  = '';
        toSlide.style.zIndex        = '';
        toSlide.style.visibility    = '';
        current = target;
        updateUI();
        animating = false;
      }, FLIP_MS + 40);
    }

    /* Cross-fade jump (menu navigation — skips many pages) */
    function jumpTo(target) {
      closeMenu();
      if (target === current) return;
      pzReset(slides[current]);
      if (animating) {
        /* Cancel any in-progress flip cleanly */
        animating = false;
        document.querySelectorAll('.flipper').forEach(f => f.remove());
        shadow.classList.remove('visible');
        slides.forEach((s, i) => {
          s.classList.toggle('active', i === current);
          s.style.zIndex = s.style.visibility = s.style.opacity =
            s.style.transition = '';
        });
      }

      const fromSlide = slides[current];
      const toSlide   = slides[target];
      animating = true;

      toSlide.style.opacity    = '0';
      toSlide.style.zIndex     = '3';
      toSlide.style.transition = `opacity ${FADE_MS}ms ease`;
      toSlide.classList.add('active');
      fromSlide.style.zIndex   = '2';

      requestAnimationFrame(() => requestAnimationFrame(() => {
        toSlide.style.opacity = '1';
      }));

      setTimeout(() => {
        fromSlide.classList.remove('active');
        fromSlide.style.zIndex    = '';
        toSlide.style.zIndex      = '';
        toSlide.style.opacity     = '';
        toSlide.style.transition  = '';
        current = target;
        updateUI();
        animating = false;
      }, FADE_MS + 30);
    }

    function goNext() { flipTo(current + 1); }
    function goPrev() { flipTo(current - 1); }

    btnNext.addEventListener('click', goNext);
    btnPrev.addEventListener('click', goPrev);

    document.addEventListener('keydown', e => {
      if (menuOpen) return;
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
        e.preventDefault(); goNext();
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault(); goPrev();
      } else if (e.key === 'Escape') {
        closeMenu();
      }
    });

    let tx = null, ty = null;
    document.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        tx = e.touches[0].clientX;
        ty = e.touches[0].clientY;
      } else {
        tx = null; ty = null; /* pellizco → cancelar swipe, pinch-to-zoom libre */
      }
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (panScale <= 1 || e.touches.length !== 1 || tx === null) return;
      const curX = e.touches[0].clientX;
      const curY = e.touches[0].clientY;
      const p = pzClamp(panTx + (curX - tx), panTy + (curY - ty), panScale);
      panTx = p.tx; panTy = p.ty;
      tx = curX; ty = curY;
      pzApply();
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (tx === null) return;
      if (!menuOpen && panScale <= 1) {
        const dx = tx - e.changedTouches[0].clientX;
        const dy = ty - e.changedTouches[0].clientY;
        if (Math.abs(dx) > 44 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          dx > 0 ? goNext() : goPrev();
        }
      }
      tx = null; ty = null;
    }, { passive: true });

    let wheelLock = false;
    document.addEventListener('wheel', e => {
      if (e.ctrlKey || e.metaKey) {
        /* Ctrl/Cmd + rueda → zoom en la posición del cursor */
        e.preventDefault();
        const rect = stage.getBoundingClientRect();
        const dir  = e.deltaY > 0 ? -1 : 1;
        zoomAt(e.clientX - rect.left, e.clientY - rect.top,
               +(panScale + dir * PZ_STEP).toFixed(2));
        return;
      }
      if (panScale > 1) {
        /* Imagen ampliada → rueda desplaza la vista (pan) */
        e.preventDefault();
        const p = pzClamp(panTx - e.deltaX * 1.2, panTy - e.deltaY * 1.2, panScale);
        panTx = p.tx; panTy = p.ty;
        pzApply();
        return;
      }
      /* Escala normal → navegar entre hojas */
      e.preventDefault();
      if (menuOpen || wheelLock) return;
      const d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
      if (d > 20) goNext();
      else if (d < -20) goPrev();
      wheelLock = true;
      setTimeout(() => { wheelLock = false; }, FLIP_MS + 60);
    }, { passive: false });

    /* ═══════════════════════════════════════════════════
       HAMBURGER MENU
    ═══════════════════════════════════════════════════ */
    const menuToggle   = document.getElementById('menuToggle');
    const menuBackdrop = document.getElementById('menuBackdrop');
    const menuDrawer   = document.getElementById('menuDrawer');
    const menuNav      = document.getElementById('menuNav');
    let menuOpen = false;

    /* ── Menu data ──────────────────────────────────── */
    const MENU = [
      { label: 'Inicio', slide: 0 },
      {
        label: 'Acerca de nosotros',
        children: [
          { label: 'ProControl México',  slide: 1 },
          { label: 'Cobertura',          slide: 2 },
        ]
      },
      {
        label: 'Sectores estratégicos',
        children: [
          { label: 'Sectores',                              slide: 3  },
          { label: 'La diferencia está en nuestro estándar', slide: 4  },
          { label: 'Alimentario',                           slide: 5  },
          { label: 'Industrial y logístico',                slide: 6  },
          { label: 'Salud',                                 slide: 7  },
          { label: 'Retail y comercial',                    slide: 8  },
          { label: 'Turismo',                               slide: 9  },
          { label: 'Residencial',                           slide: 10 },

      },
      {

        children: [

          { label: 'Control de aves',             slide: 17 },
          { label: 'Control de xilófagos',        slide: 18 },
          { label: 'Desinfección patógena',       slide: 19 },
          { label: 'Bioseguridad integral',       slide: 20 },
          { label: 'Soluciones especiales',       slide: 21 },
          { label: 'Métodos de aplicación',       slide: 22 },
          { label: 'Termografía infrarroja',      slide: 23 },
        ]
      },
      { label: 'Plataforma digital CRM', slide: 24 },
      { label: 'Cumplimiento normativo',  slide: 25 },
      {
        label: 'Nuestros clientes',
        children: [
          { label: 'Sector público y salud', slide: 26 },
          { label: 'Sector privado',         slide: 27 },

    ];

    /* Chevron SVG */
    function chevronSVG() {
      return `<svg class="chevron" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>`;
    }

    /* ── Render menu ────────────────────────────────── */
    function buildMenu() {
      MENU.forEach((item, idx) => {
        if (idx > 0 && (idx === 1 || idx === 7 || idx === 8)) {
          const div = document.createElement('div');
          div.className = 'menu-divider';
          menuNav.appendChild(div);
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'menu-item';

        if (item.children) {
          /* Expandable parent */
          const row = document.createElement('button');
          row.className = 'menu-row';
          row.innerHTML = `
            <span class="menu-row-text">${item.label}</span>
            ${chevronSVG()}
          `;
          row.addEventListener('click', () => {
            wrapper.classList.toggle('expanded');
          });

          const sub = document.createElement('div');
          sub.className = 'submenu';
          const inner = document.createElement('div');
          inner.className = 'submenu-inner';

          item.children.forEach(child => {
            const btn = document.createElement('button');
            btn.className = 'sub-btn';
            btn.innerHTML = `<span class="sub-btn-text">${child.label}</span>`;
            btn.addEventListener('click', () => jumpTo(child.slide));
            inner.appendChild(btn);
          });

          sub.appendChild(inner);
          wrapper.appendChild(row);
          wrapper.appendChild(sub);

        } else {
          /* Direct link */
          const row = document.createElement('button');
          row.className = 'menu-row';
          row.innerHTML = `<span class="menu-row-text">${item.label}</span>`;
          row.addEventListener('click', () => jumpTo(item.slide));
          wrapper.appendChild(row);
        }

        menuNav.appendChild(wrapper);
      });
    }
    buildMenu();

    /* ── Open / close ───────────────────────────────── */
    function openMenu() {
      menuOpen = true;
      menuToggle.classList.add('open');
      menuBackdrop.classList.add('visible');
      menuDrawer.classList.add('open');
    }

    function closeMenu() {
      menuOpen = false;
      menuToggle.classList.remove('open');
      menuBackdrop.classList.remove('visible');
      menuDrawer.classList.remove('open');
    }

    menuToggle.addEventListener('click', () => menuOpen ? closeMenu() : openMenu());
    menuBackdrop.addEventListener('click', closeMenu);

    /* ═══════════════════════════════════════════════════
       PAN & ZOOM
    ═══════════════════════════════════════════════════ */
    const PZ_MIN  = 1;
    const PZ_MAX  = 4;
    const PZ_STEP = 0.25;

    let panScale     = 1;
    let panTx        = 0;
    let panTy        = 0;
    let isDragging   = false;
    let dragSX       = 0, dragSY = 0;
    let dragOriginTx = 0, dragOriginTy = 0;

    const btnZoomIn  = document.getElementById('btnZoomIn');
    const btnZoomOut = document.getElementById('btnZoomOut');

    /* ── Core helpers (function declarations → hoistable) ── */

    function pzClamp(tx, ty, sc) {
      const W = stage.offsetWidth, H = stage.offsetHeight;
      return {
        tx: Math.min(0, Math.max(W * (1 - sc), tx)),
        ty: Math.min(0, Math.max(H * (1 - sc), ty))
      };
    }

    function pzApply() {
      const sl = slides[current];
      sl.style.transformOrigin = '0 0';
      sl.style.transform = (panScale === 1 && panTx === 0 && panTy === 0)
        ? ''
        : `translate(${panTx}px,${panTy}px) scale(${panScale})`;
      stage.style.cursor = panScale > 1 ? (isDragging ? 'grabbing' : 'grab') : '';
      btnZoomIn .classList.toggle('maxed', panScale >= PZ_MAX);
      btnZoomOut.classList.toggle('maxed', panScale <= PZ_MIN);
    }

    function pzReset(slideEl) {
      panScale = 1; panTx = 0; panTy = 0; isDragging = false;
      if (slideEl) {
        slideEl.style.transform      = '';
        slideEl.style.transformOrigin = '';
      }
      stage.style.cursor = '';
      btnZoomIn ?.classList.remove('maxed');
      btnZoomOut?.classList.remove('maxed');
    }

    function zoomAt(cx, cy, newScale) {
      newScale = Math.min(PZ_MAX, Math.max(PZ_MIN, newScale));
      if (newScale === panScale) return;
      const ratio = newScale / panScale;
      const p = pzClamp(
        cx - (cx - panTx) * ratio,
        cy - (cy - panTy) * ratio,
        newScale
      );
      panScale = newScale; panTx = p.tx; panTy = p.ty;
      pzApply();
    }

    /* ── Zoom buttons ───────────────────────────────── */
    btnZoomIn.addEventListener('click', () => {
      const r = stage.getBoundingClientRect();
      zoomAt(r.width / 2, r.height / 2, +(panScale + PZ_STEP).toFixed(2));
    });
    btnZoomOut.addEventListener('click', () => {
      const r = stage.getBoundingClientRect();
      zoomAt(r.width / 2, r.height / 2, +(panScale - PZ_STEP).toFixed(2));
    });

    /* ── Doble clic: restablecer ────────────────────── */
    stage.addEventListener('dblclick', () => pzReset(slides[current]));

    /* ── Arrastre con ratón (pan) ───────────────────── */
    stage.addEventListener('mousedown', e => {
      if (panScale <= 1 || e.button !== 0) return;
      isDragging   = true;
      dragSX       = e.clientX;
      dragSY       = e.clientY;
      dragOriginTx = panTx;
      dragOriginTy = panTy;
      stage.style.cursor = 'grabbing';
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const p = pzClamp(
        dragOriginTx + (e.clientX - dragSX),
        dragOriginTy + (e.clientY - dragSY),
        panScale
      );
      panTx = p.tx; panTy = p.ty;
      pzApply();
    });

    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      stage.style.cursor = panScale > 1 ? 'grab' : '';
    });

    /* ═══════════════════════════════════════════════════
       PRINT
    ═══════════════════════════════════════════════════ */
    document.getElementById('btnPrint').addEventListener('click', () => {
      /* Extract URL from the active slide's background-image */
      const raw = slides[current].style.backgroundImage;
      const src = raw.replace(/^url\(["']?/, '').replace(/["']?\)$/, '');

      /* Inject a real <img> so browsers always print it
         (background-image printing requires a user setting in some browsers) */
      const img = document.createElement('img');
      img.id = 'print-img';
      img.src = src;
      document.body.appendChild(img);

      window.print();

      /* Remove the helper image once the dialog closes */
      window.addEventListener('afterprint', () => {
        const el = document.getElementById('print-img');
        if (el) el.remove();
      }, { once: true });
    });

    /* ═══════════════════════════════════════════════════
       SHARE
    ═══════════════════════════════════════════════════ */
    const toastEl = document.getElementById('toast');
    let toastTimer = null;

    function showToast(msg) {
      if (msg) toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
    }

    document.getElementById('btnShare').addEventListener('click', async () => {
      const url = location.href;

      if (navigator.share) {
        try {
          await navigator.share({
            title: 'ProControl — Dossier',
            text: 'Te comparto el dossier de ProControl.',
            url,
          });
        } catch (err) {
          /* User cancelled share dialog — no action needed */
          if (err.name !== 'AbortError') showToast('No se pudo compartir');
        }
      } else {
        /* Fallback: copy link to clipboard */
        try {
          await navigator.clipboard.writeText(url);
          showToast('Enlace copiado al portapapeles');
        } catch {
          /* Clipboard API not available either */
          showToast('Copia el enlace manualmente');
        }
      }
    });

    /* ═══════════════════════════════════════════════════

       Imágenes cuadradas 2000 × 2000 px.
       l = left, t = top, w = width, h = height  (fracción 0–1 de la imagen).
       El borde rojo en .qr-zone está activo; quítalo cuando todo esté alineado.
    ═══════════════════════════════════════════════════ */
    (function () {
      const QR_W = 2000, QR_H = 2000;

      const WA_MSG = encodeURIComponent('¡Hola! Vi su contacto y me gustaría más información sobre los servicios de ProControl México.');
      const WA_BASE = 'https://wa.me/';

      const zones = [
        /* ── Página 1 ──────────────────────────────────────────── */
        {
          slide: 0, label: 'QR Portada',
          href: 'https://gavainc.github.io/Procontrol-Mexico', target: '_blank',
          l: 0.031, t: 0.72, w: 0.18, h: 0.18
        },
        {
          slide: 0, label: 'Sitio Web',
          href: 'https://www.procontrolmexico.com', target: '_blank',
          l: 0.545, t: 0.945, w: 0.45, h: 0.04
        },

        /* ── Página 29: zonas de contacto ──────────────────────── */
        {
          slide: 28, label: 'Tel Corporativo',
          href: 'tel:+525557162876', target: '',
          l: 0.04, t: 0.685, w: 0.220, h: 0.02
        },
        {
          slide: 28, label: 'WA Corporativo',
          href: WA_BASE + '525540014294?' + 'text=' + WA_MSG, target: '_blank',
          l: 0.04, t: 0.71, w: 0.220, h: 0.02
        },
        {
          slide: 28, label: 'Tel Operativo',
          href: 'tel:+529992841288', target: '',
          l: 0.04, t: 0.82, w: 0.220, h: 0.02
        },
        {
          slide: 28, label: 'WA Operativo',
          href: WA_BASE + '529992841288?' + 'text=' + WA_MSG, target: '_blank',
          l: 0.04, t: 0.845, w: 0.220, h: 0.02
        },
        {
          slide: 28, label: 'Sitio Web',
          href: 'https://www.procontrolmexico.com', target: '_blank',
          l: 0.545, t: 0.945, w: 0.45, h: 0.04
        },
        {
          slide: 28, label: 'QR Contacto',
          href: 'https://gavainc.github.io/Procontrol-Mexico', target: '_blank',
          l: 0.75, t: 0.67, w: 0.18, h: 0.18
        }
      ];

      /* Crear los <a> dentro de cada slide (siguen el zoom/pan automáticamente) */
      const anchors = zones.map(z => {
        const a = document.createElement('a');
        a.href      = z.href;
        a.className = 'qr-zone';
        a.setAttribute('aria-label', z.label);
        if (z.target) {
          a.target = z.target;
          a.rel    = 'noopener noreferrer';
        }
        a.addEventListener('mousedown',  e => e.stopPropagation());
        a.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
        slides[z.slide].appendChild(a);
        return { a, z };
      });

      /* Recalcula posición según el rect 'contain' de la imagen */
      function layout() {
        const cW = stage.offsetWidth;
        const cH = stage.offsetHeight;
        const sc = Math.min(cW / QR_W, cH / QR_H);
        const rW = QR_W * sc;
        const rH = QR_H * sc;
        const ox = (cW - rW) / 2;  /* pillarbox */
        const oy = (cH - rH) / 2;  /* letterbox */

        anchors.forEach(({ a, z }) => {
          a.style.left   = (ox + z.l * rW) + 'px';
          a.style.top    = (oy + z.t * rH) + 'px';
          a.style.width  = (z.w * rW) + 'px';
          a.style.height = (z.h * rH) + 'px';
        });
      }

      layout();
      window.addEventListener('resize', layout);
    }());
  </script>

</body>
</html>
